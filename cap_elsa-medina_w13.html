<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reporte Semanal CRM — {{WEEK_LABEL}}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --color-fondo: #f8f9fa;
      --color-primario: #701321;
      --color-primario-light: #8e1a2a;
      --color-primario-dark: #4d0d17;
      --color-oro: #b38e1d;
      --color-oro-brillante: #d4af37;
      --color-oro-suave: #F4E4C1;
      --texto-oscuro: #2d0a0a;
      --texto-claro: #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: radial-gradient(circle at center, #fff 0%, #f0f0f0 100%); color: var(--texto-oscuro); min-height: 100vh; padding: 20px; }
    .container { max-width: 960px; margin: 0 auto; }
    .fade-in { opacity: 0; transform: translateY(16px); animation: fadeUp .5s ease-out forwards; }
    @keyframes fadeUp { to { opacity:1; transform:none; } }
    .d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}.d4{animation-delay:.4s}.d5{animation-delay:.5s}

    .page-header { text-align:center; margin-bottom:32px; }
    .page-header h1 { font-size:1.8rem; letter-spacing:3px; color:var(--color-primario); text-transform:uppercase; border-bottom:3px solid var(--color-oro); padding-bottom:10px; display:inline-block; }
    .page-header .subtitle { font-size:.85rem; color:#888; margin-top:8px; }

    .meta-bar { display:flex; gap:24px; flex-wrap:wrap; background:#fff; border-radius:12px; padding:16px 20px; margin-bottom:24px; box-shadow:0 2px 8px rgba(0,0,0,.06); font-size:.8rem; }
    .meta-bar .label { font-weight:700; color:var(--color-primario); }

    .card { background:#fff; border-radius:14px; box-shadow:0 4px 16px rgba(0,0,0,.06); margin-bottom:20px; overflow:hidden; }
    .card-head { padding:18px 22px; border-bottom:1px solid #f0e8d0; }
    .card-head h2 { font-size:1rem; font-weight:700; color:var(--color-primario); }
    .card-head .badge { font-size:.7rem; padding:3px 10px; border-radius:20px; font-weight:600; }
    .badge-red { background:var(--color-primario); color:#fff; }
    .badge-gold { background:var(--color-oro-suave); color:var(--color-oro); }
    .badge-green { background:#e8f5e9; color:#2e7d32; }
    .card-body { padding:20px 22px; }

    .summary-text { font-size:.9rem; line-height:1.7; margin-bottom:12px; }
    .summary-text strong { color:var(--color-primario); }

    .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:16px 0; }
    .kpi { text-align:center; padding:16px 8px; border-radius:12px; background:var(--color-oro-suave); }
    .kpi .num { font-size:1.6rem; font-weight:800; color:var(--color-primario); }
    .kpi .lbl { font-size:.7rem; color:#666; margin-top:2px; }
    .kpi .delta { font-size:.65rem; margin-top:4px; }
    .delta-up { color:#2e7d32; }
    .delta-down { color:var(--color-primario); }
    .delta-neutral { color:#888; }

    table { width:100%; border-collapse:collapse; font-size:.82rem; }
    th { background:var(--color-primario); color:#fff; padding:10px 14px; text-align:left; font-weight:600; }
    td { padding:9px 14px; border-bottom:1px solid #f0e8d0; }
    tr:hover td { background:#faf6f0; }
    .text-right { text-align:right; }
    .text-center { text-align:center; }

    .alert { padding:12px 16px; border-radius:10px; margin:8px 0; font-size:.82rem; }
    .alert-red { background:#fce4e4; border-left:4px solid var(--color-primario); }
    .alert-yellow { background:#fff8e1; border-left:4px solid var(--color-oro); }
    .alert-green { background:#e8f5e9; border-left:4px solid #2e7d32; }

    .campus-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:16px; }
    .campus-card { border:1px solid #f0e8d0; border-radius:12px; padding:16px; }
    .campus-card h3 { font-size:.9rem; color:var(--color-primario); margin-bottom:10px; }
    .campus-stat { display:flex; justify-content:space-between; padding:4px 0; font-size:.8rem; border-bottom:1px solid #faf6f0; }
    .campus-stat:last-child { border-bottom:none; }

    .cap-section { border:1px solid #f0e8d0; border-radius:14px; padding:20px; margin-bottom:16px; }
    .cap-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
    .cap-header h3 { font-size:.95rem; color:var(--color-primario); }
    .cap-header .campus-tag { font-size:.7rem; padding:3px 10px; border-radius:20px; background:var(--color-oro-suave); color:var(--color-oro); font-weight:600; }
    .conv-review { background:#faf8f4; border-radius:10px; padding:14px; margin:10px 0; }
    .conv-review .conv-name { font-weight:700; font-size:.85rem; color:var(--color-primario); }
    .conv-review .conv-meta { font-size:.75rem; color:#888; margin:4px 0 8px; }
    .conv-review blockquote { border-left:3px solid var(--color-oro); padding:8px 12px; margin:8px 0; font-style:italic; font-size:.82rem; color:#555; background:rgba(179,142,29,.05); border-radius:0 8px 8px 0; }

    .chart-container { height:220px; margin:12px 0; }
    .footer { text-align:center; padding:32px 0 16px; font-size:.75rem; color:#aaa; }
    .back-link { display:inline-block; margin-bottom:20px; color:var(--color-primario); text-decoration:none; font-size:.85rem; font-weight:600; }
    .back-link:hover { text-decoration:underline; }

    @media (max-width:700px) { .kpi-grid{grid-template-columns:repeat(2,1fr)} .campus-grid{grid-template-columns:1fr} }
    @media print { body{padding:0;background:#fff} .card{box-shadow:none;break-inside:avoid} .back-link{display:none} }

    /* CAP individual report styles */
    .campus-badge { font-size:.7rem; padding:3px 10px; border-radius:20px; background:var(--color-oro-suave); color:var(--color-oro); font-weight:600; }
    .rating-badge { font-size:.7rem; padding:3px 10px; border-radius:20px; background:#f0e8d0; color:var(--color-primario); font-weight:700; margin-left:8px; }
    .conversations { margin-top:16px; }
    .conversations h4 { font-size:.85rem; font-weight:700; color:var(--color-primario); margin-bottom:10px; }
    .conv { background:#faf8f4; border-radius:10px; padding:14px; margin:10px 0; }
    .conv-header { margin-bottom:8px; }
    .conv-header strong { font-size:.85rem; color:var(--color-primario); }
    .conv-meta { display:block; font-size:.75rem; color:#888; margin:4px 0; }
    .conv-context { font-size:.82rem; color:#555; margin:6px 0; line-height:1.5; }
    .conv-highlight { border-left:3px solid var(--color-oro); padding:8px 12px; margin:8px 0; font-style:italic; font-size:.82rem; color:#555; background:rgba(179,142,29,.05); border-radius:0 8px 8px 0; }
    .feedback { margin-top:14px; padding:12px 16px; background:#faf8f4; border-radius:10px; }
    .feedback h4 { font-size:.85rem; font-weight:700; margin-bottom:8px; }
    .feedback ul { padding-left:18px; }
    .feedback li { font-size:.82rem; line-height:1.6; margin:4px 0; color:#444; }
    .feedback.improvements { background:#fff8f0; }
    .feedback.improvements h4 { color:#c77d00; }
    .focus-box { margin-top:14px; padding:14px 16px; background:linear-gradient(135deg, #f9f5eb, #faf8f4); border:1px solid #e8dfc0; border-radius:10px; }
    .focus-box h4 { font-size:.85rem; font-weight:700; color:var(--color-primario); margin-bottom:6px; }
    .focus-box p { font-size:.85rem; color:#444; line-height:1.6; }
    .section-title { font-size:1.05rem; font-weight:700; color:var(--color-primario); padding-bottom:8px; border-bottom:2px solid var(--color-oro-suave); }
  </style>
</head>
<body>
<div class="container">
  <a href="reportes.html" class="back-link">← Todos los reportes</a>

  <header class="page-header fade-in">
    <h1>Reporte Semanal CRM</h1>
    <div class="subtitle" id="weekLabel"></div>
  </header>

  <div id="capSections"></div>

  <div class="footer"><p>Reporte generado por ALTURA Performance Marketing</p></div></div>

<script>
// ══════════════════════════════════════════════════════════════════════
// REPORT_DATA — This is what Ops fills. Everything below renders from it.
// ══════════════════════════════════════════════════════════════════════
const D = {"weekLabel":"Colegio Newland (NWL) — Semana W13 (V2) — Elsa Medina","weekRange":"Mar 23–29, 2026","extractedAt":"2026-03-27 CST","summary":"Reporte individual de Elsa Medina — Zibatá","kpis":[],"capSections":[{"name":"Elsa Medina","campus":"Zibatá","weeklyMetrics":[{"label":"Oportunidades activas","current":"166","prev":"—","delta":"—"},{"label":"Leads nuevos","current":"32","prev":"—","delta":"—"},{"label":"Inscripciones","current":"4","prev":"—","delta":"—"},{"label":"Perdidos (tw)","current":"17","prev":"—","delta":"—"},{"label":"Calificado/Nuevo sin agendar","current":"88","prev":"—","delta":"—"},{"label":"Post-visita","current":"33","prev":"—","delta":"—"},{"label":"No-shows acumulados","current":"10","prev":"—","delta":"—"}],"conversations":[{"leadName":"Cristi Janeth Alejandro Burgos","stage":"Calificado","messageCount":30,"outbound":14,"inbound":16,"context":"Familia interesada en Kinder y Primaria para 3 hijos en Zibatá. Pidió costos por correo. Conversación del 26 de enero — 2 meses sin mover.","highlight":"\"Listo, Cristi. Ya tengo registrado su solicitud y en breve se enviará la información al correo [...] Cuando revise la información y si desea agendar la visita, con gusto le ayudo.\""},{"leadName":"Rodolfo Becerra Ojeda","stage":"Cita — Realizada","messageCount":30,"outbound":20,"inbound":8,"context":"Visita 24 marzo. Buen flujo pre-visita: recordatorio 24h, confirmación manual, recordatorio 2h.","highlight":"\"También queda solicitada la información de Kínder a su correo [...] Si gusta, lleve cualquier dato de la escuela actual de Emily.\""}],"strengths":["Aporte personal de Elsa sobre la secuencia automatizada de Rodolfo marca la diferencia: confirmación cálida ('lo espero mañana a la 1 pm') y sugerencia de traer boleta de Emily — el sistema pone la estructura (recordatorios 24h, 2h, bienvenida = NORA/workflow), el CAP pone la calidez","Única CAP que cerró esta semana (4 inscripciones). Constancia","Post-visita de Rodolfo tiene componente automatizado PERO el contenido sobre Emily y la boleta SÍ es personal — venta consultiva real"],"improvements":["🔴 Seguimiento a leads fríos es copy-paste. Envió el MISMO mensaje a Cristi Janeth dos veces (6 y 20 de marzo): \"Espero se encuentre muy bien, me pongo en contacto con un mensaje de seguimiento...\" — textualmente idéntico. Cero referencia a sus 3 hijos ni a los costos que pidió. 2 meses en Calificado","NORA/workflow hace el trabajo pesado en el hilo de Rodolfo (recordatorios, confirmaciones = source: workflow). Los mensajes personales de Elsa son efectivos cuando los hace — necesita más de esos en Calificado, donde NORA calienta pero Elsa necesita cerrar con seguimiento personal","17 perdidos esta semana sin razones documentadas. ¿Caídos por falta de seguimiento o desinterés real?"],"focus":"10 leads en Calificado recientes → mensaje PERSONALIZADO (nombre del hijo, nivel, referencia a última interacción). CERO copy-paste. Si no responden en 48h, llamar.","rating":"6/10 — Operadora de Volumen"}]};

if (!D) { document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#999;">No report data loaded.</div>'; }
else { render(D); }

// Safe value helper — never show null/undefined
function v(val, fallback) { return (val === null || val === undefined || val === 'null' || val === 'undefined') ? (fallback !== undefined ? fallback : '—') : val; }

function render(d) {
  var el = document.getElementById('weekLabel');
  if (el) el.textContent = d.weekLabel || '';

  if (d.capSections && d.capSections.length > 0) {
    var container = document.getElementById('capSections');
    var html = '<h2 class="section-title" style="margin-top:20px;">Secciones Individuales CAP</h2>';
    d.capSections.forEach(function(cap) {
      html += '<div class="cap-section card fade-in">';
      html += '<div class="cap-header"><h3>' + cap.name + '</h3><span class="campus-badge">&#128205; ' + cap.campus + '</span>';
      if (cap.rating) html += '<span class="rating-badge">' + cap.rating + '</span>';
      html += '</div>';
      html += '<table class="data-table"><thead><tr><th>M&#233;trica</th><th class="text-right">Sem Ant</th><th class="text-right">Esta Sem</th><th class="text-right">&#916;</th></tr></thead><tbody>';
      (cap.weeklyMetrics||[]).forEach(function(m) {
        html += '<tr><td>' + m.label + '</td><td class="text-right">' + (m.prev||'&#8212;') + '</td><td class="text-right">' + (m.current||'&#8212;') + '</td><td class="text-right">' + (m.delta||'&#8212;') + '</td></tr>';
      });
      html += '</tbody></table>';
      if ((cap.conversations||[]).length > 0) {
        html += '<div class="conversations"><h4>Conversaciones Revisadas</h4>';
        cap.conversations.forEach(function(c) {
          html += '<div class="conv"><div class="conv-header"><strong>' + c.leadName + '</strong><span class="conv-meta">Etapa: ' + c.stage + ' &#183; ' + c.messageCount + ' mensajes (' + (c.outbound||0) + ' salientes / ' + (c.inbound||0) + ' entrantes)</span></div>';
          html += '<p class="conv-context">' + c.context + '</p>';
          if (c.highlight) html += '<blockquote class="conv-highlight">' + c.highlight + '</blockquote>';
          html += '</div>';
        });
        html += '</div>';
      }
      if ((cap.strengths||[]).length > 0) {
        html += '<div class="feedback"><h4>&#9989; Fortalezas</h4><ul>';
        cap.strengths.forEach(function(s) { html += '<li>' + s + '</li>'; });
        html += '</ul></div>';
      }
      if ((cap.improvements||[]).length > 0) {
        html += '<div class="feedback improvements"><h4>&#9888;&#65039; Areas de Mejora</h4><ul>';
        cap.improvements.forEach(function(s) { html += '<li>' + s + '</li>'; });
        html += '</ul></div>';
      }
      if (cap.focus) {
        html += '<div class="focus-box"><h4>&#127919; Foco Esta Semana</h4><p>' + cap.focus + '</p></div>';
      }
      html += '</div>';
    });
    container.innerHTML = html;
  }
}
</script>
</body>
</html>
