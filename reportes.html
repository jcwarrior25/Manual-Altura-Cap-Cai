<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes - Colegio NWL</title>
    <style>
        :root {
            --color-primario: #701321;
            --color-primario-light: #8e1a2a;
            --color-primario-dark: #4d0d17;
            --color-oro: #b38e1d;
            --color-oro-brillante: #d4af37;
            --color-oro-suave: #F4E4C1;
            --texto-oscuro: #2d0a0a;
            --sidebar-w: 300px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f0f0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ── Top bar ── */
        .topbar {
            background: var(--color-primario-dark);
            color: var(--color-oro-brillante);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            z-index: 10;
        }
        .topbar-title {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .topbar-subtitle {
            font-size: 0.75rem;
            color: rgba(212,175,55,0.7);
            margin-top: 1px;
        }
        .topbar-logo {
            width: 36px;
            height: 36px;
            border: 2px solid var(--color-oro-brillante);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 900;
            color: var(--color-oro-brillante);
            letter-spacing: -1px;
        }

        /* ── Hamburger (mobile) ── */
        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .hamburger svg { width: 24px; height: 24px; stroke: var(--color-oro-brillante); stroke-width: 2; fill: none; }

        /* ── Main layout ── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            background: var(--color-primario);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: var(--color-primario-dark); }
        .sidebar::-webkit-scrollbar-thumb { background: var(--color-oro); border-radius: 4px; }

        /* Tipo section (Semanal / Mensual) */
        .tipo-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            transition: background 0.2s;
        }
        .tipo-header:hover { background: var(--color-primario-light); }
        .tipo-header span {
            font-size: 0.82rem;
            font-weight: 700;
            color: var(--color-oro-brillante);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .tipo-header .arrow {
            width: 14px; height: 14px;
            fill: none; stroke: var(--color-oro-brillante); stroke-width: 2.5;
            transition: transform 0.3s;
            flex-shrink: 0;
        }
        .tipo-header.open .arrow { transform: rotate(180deg); }

        .tipo-content { display: none; }
        .tipo-content.open { display: block; }

        /* Mes header */
        .mes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 10px 28px;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }
        .mes-header:hover { background: rgba(0,0,0,0.15); }
        .mes-header span {
            font-size: 0.78rem;
            font-weight: 600;
            color: rgba(244,228,193,0.85);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .mes-header .arrow-sm {
            width: 12px; height: 12px;
            fill: none; stroke: var(--color-oro); stroke-width: 2.5;
            transition: transform 0.3s;
        }
        .mes-header.open .arrow-sm { transform: rotate(180deg); }

        .mes-content { display: none; }
        .mes-content.open { display: block; }

        /* Reporte item */
        .reporte-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 16px 10px 36px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.2s;
            text-decoration: none;
        }
        .reporte-item:hover { background: rgba(212,175,55,0.12); }
        .reporte-item.active {
            background: var(--color-oro-brillante);
        }
        .reporte-item.active .rep-num { background: var(--color-primario); color: var(--color-oro-brillante); }
        .reporte-item.active .rep-title { color: var(--texto-oscuro); }
        .reporte-item.active .rep-date { color: rgba(45,10,10,0.65); }

        .rep-num {
            background: rgba(212,175,55,0.2);
            color: var(--color-oro-brillante);
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 12px;
            white-space: nowrap;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .rep-text { flex: 1; }
        .rep-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.9);
            line-height: 1.3;
        }
        .rep-date {
            font-size: 0.7rem;
            color: rgba(212,175,55,0.6);
            margin-top: 2px;
        }

        /* Vacío */
        .sidebar-empty {
            padding: 10px 20px 14px 36px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            font-style: italic;
        }

        /* ── Content area ── */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: white;
        }

        .content-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ccc;
            gap: 16px;
            padding: 40px;
        }
        .content-placeholder svg { width: 64px; height: 64px; opacity: 0.3; }
        .content-placeholder p { font-size: 1rem; font-weight: 600; color: #bbb; }
        .content-placeholder span { font-size: 0.85rem; color: #ccc; }

        #report-frame {
            width: 100%;
            flex: 1;
            border: none;
            display: none;
        }

        /* ── Overlay (mobile) ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 5;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .hamburger { display: block; }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                z-index: 20;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                width: 280px;
            }
            .sidebar.open { transform: translateX(0); }
            .overlay.open { display: block; }

            body { overflow: auto; }
            .main { overflow: visible; }
        }
    </style>
</head>
<body>

    <!-- Top bar -->
    <div class="topbar">
        <button class="hamburger" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div>
            <div class="topbar-title">Centro de Reportes</div>
            <div class="topbar-subtitle">Colegio NWL · Operaciones</div>
        </div>
        <div class="topbar-logo">NWL</div>
    </div>

    <!-- Overlay (mobile) -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="main">

        <!-- ── Sidebar ── -->
        <nav class="sidebar" id="sidebar">

            <!-- SEMANALES -->
            <div class="tipo-header open" onclick="toggleTipo(this)">
                <span>📅 Semanales</span>
                <svg class="arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="tipo-content open">

                <!-- Marzo 2026 -->
                <div class="mes-header open" onclick="toggleMes(this)">
                    <span>Marzo 2026</span>
                    <svg class="arrow-sm" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="mes-content open">
                                        <a class="reporte-item" onclick="loadReport(this, 'reporte-semanal-2026-W13.html')">
                        <span class="rep-num">W13</span>
                        <div class="rep-text">
                            <div class="rep-title">Reporte Semanal CRM</div>
                            <div class="rep-date">Mar 23–29, 2026</div>
                        </div>
                    </a>
<a class="reporte-item" onclick="loadReport(this, 'reporte_1_15-22-marzo-2026.html')">
                        <span class="rep-num">#1</span>
                        <div class="rep-text">
                            <div class="rep-title">Calidad de Datos</div>
                            <div class="rep-date">15 – 22 Mar 2026</div>
                        </div>
                    </a>
                </div>

                <!-- Abril 2026 -->
                <div class="mes-header" onclick="toggleMes(this)">
                    <span>Abril 2026</span>
                    <svg class="arrow-sm" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="mes-content">
                    <p class="sidebar-empty">Sin reportes aún</p>
                </div>

            </div>

            <!-- MENSUALES -->
            <div class="tipo-header" onclick="toggleTipo(this)">
                <span>📊 Mensuales</span>
                <svg class="arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="tipo-content">

                <div class="mes-header open" onclick="toggleMes(this)">
                    <span>2026</span>
                    <svg class="arrow-sm" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="mes-content open">
                    <p class="sidebar-empty">Sin reportes aún</p>
                </div>

            </div>

        </nav>

        <!-- ── Content ── -->
        <div class="content">

            <div class="content-placeholder" id="placeholder">
                <svg viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
                    <path d="M9 17v-2m3 2v-4m3 4v-6M5 21h14a2 2 0 002-2V7l-5-5H5a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                </svg>
                <p>Selecciona un reporte</p>
                <span>El contenido se desplegará aquí</span>
            </div>

            <iframe id="report-frame" title="Reporte"></iframe>

        </div>

    </div>

    <script>
        function toggleTipo(header) {
            header.classList.toggle('open');
            header.nextElementSibling.classList.toggle('open');
        }

        function toggleMes(header) {
            header.classList.toggle('open');
            header.nextElementSibling.classList.toggle('open');
        }

        function loadReport(el, url) {
            // Quitar active de todos
            document.querySelectorAll('.reporte-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');

            const frame = document.getElementById('report-frame');
            const placeholder = document.getElementById('placeholder');

            placeholder.style.display = 'none';
            frame.style.display = 'block';
            frame.src = url;

            // Cerrar sidebar en mobile
            if (window.innerWidth <= 768) toggleSidebar();
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }
    </script>

</body>
</html>
