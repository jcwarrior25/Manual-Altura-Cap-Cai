<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso — Centro de Reportes NWL</title>
    <style>
        :root {
            --color-primario: #701321;
            --color-primario-light: #8e1a2a;
            --color-primario-dark: #4d0d17;
            --color-oro: #b38e1d;
            --color-oro-brillante: #d4af37;
            --texto-oscuro: #2d0a0a;
            --sombra-fuerte: 0 12px 30px rgba(112, 19, 33, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #ffffff 0%, #f0f0f0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--sombra-fuerte);
            border-top: 5px solid var(--color-primario);
        }

        .login-header { text-align: center; margin-bottom: 36px; }

        .login-logo {
            width: 64px; height: 64px;
            background: var(--color-primario);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; font-weight: 900;
            color: var(--color-oro-brillante);
            letter-spacing: -1px;
            margin: 0 auto 20px;
            border: 2px solid var(--color-oro-brillante);
        }

        .login-title {
            font-size: 1.5rem; font-weight: 800;
            letter-spacing: 2px;
            color: var(--color-primario);
            text-transform: uppercase;
        }

        .login-subtitle { font-size: 0.85rem; color: #888; margin-top: 6px; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            color: var(--color-primario);
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.88rem;
        }

        .form-group input {
            width: 100%; padding: 12px 16px;
            border: 2px solid #e0d0b0;
            border-radius: 12px;
            font-size: 1rem; font-family: inherit;
            transition: border-color 0.3s; outline: none;
        }

        .form-group input:focus { border-color: var(--color-primario); }

        .btn-login {
            width: 100%;
            background: var(--color-primario);
            color: white; border: none;
            padding: 14px; border-radius: 12px;
            font-size: 1rem; font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            letter-spacing: 1px; margin-top: 8px;
        }

        .btn-login:hover { background: var(--color-primario-light); transform: translateY(-2px); }
        .btn-login:active { transform: translateY(0); }

        .error-msg {
            background: #fff0f0; color: #c0392b;
            border: 1px solid #f5c6cb;
            border-radius: 10px; padding: 10px 14px;
            font-size: 0.85rem; margin-bottom: 16px;
            display: none; text-align: center;
        }
        .error-msg.show { display: block; }

        .footer-text { text-align: center; margin-top: 24px; font-size: 0.75rem; color: #aaa; }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">NWL</div>
            <div class="login-title">Centro de Reportes</div>
            <div class="login-subtitle">Ingresa tus credenciales para continuar</div>
        </div>

        <div class="error-msg" id="error-msg">Usuario o contraseña incorrectos.</div>

        <div class="form-group">
            <label for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Ej: admin" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="btn-login" onclick="iniciarSesion()">Iniciar Sesión</button>

        <div class="footer-text">Colegio NWL · Acceso Restringido</div>
    </div>

    <script>
        // ── Usuarios por defecto (se guardan en localStorage la primera vez) ──
        const USUARIOS_DEFAULT = {
            "admin": {
                nombre: "Administrador ALTURA",
                password: "altura2026",
                role: "admin",
                reportes: []
            },
            "cap.cai": {
                nombre: "Coordinador CAP/CAI",
                password: "cai2026",
                role: "user",
                reportes: ["semanales-marzo-2026", "semanales-abril-2026"]
            },
            "elsa.medina": {
                nombre: "Elsa Medina",
                password: "elsa2026",
                role: "user",
                reportes: ["cap-elsa-medina"]
            },
            "daniela.alamilla": {
                nombre: "Daniela Alamilla",
                password: "daniela2026",
                role: "user",
                reportes: ["cap-daniela-alamilla"]
            },
            "ana.isabel": {
                nombre: "Ana Isabel Cervantes",
                password: "ana2026",
                role: "user",
                reportes: ["cap-ana-isabel"]
            },
            "delia.rodriguez": {
                nombre: "Delia Rodriguez",
                password: "delia2026",
                role: "user",
                reportes: ["cap-delia-rodriguez"]
            },
            "alberto.rodriguez": {
                nombre: "Alberto Rodriguez",
                password: "alberto2026",
                role: "user",
                reportes: ["cap-alberto-rodriguez"]
            },
            "elizabeth.barrios": {
                nombre: "Elizabeth Barrios",
                password: "elizabeth2026",
                role: "user",
                reportes: ["cap-elizabeth-barrios"]
            }
        };

        // Re-seed si cambia la versión del sistema de permisos
        const NWL_VERSION = "4";
        if (localStorage.getItem('nwl_version') !== NWL_VERSION) {
            localStorage.setItem('nwl_users', JSON.stringify(USUARIOS_DEFAULT));
            localStorage.setItem('nwl_version', NWL_VERSION);
        }

        // Si ya hay sesión activa, redirigir
        if (localStorage.getItem('nwl_session')) {
            window.location.href = 'reportes.html';
        }

        document.getElementById('usuario').addEventListener('keydown', e => { if (e.key === 'Enter') iniciarSesion(); });
        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') iniciarSesion(); });

        function iniciarSesion() {
            const usuario = document.getElementById('usuario').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('nwl_users') || '{}');
            const errorMsg = document.getElementById('error-msg');

            if (!usuario || !password) {
                errorMsg.textContent = 'Por favor ingresa usuario y contraseña.';
                errorMsg.classList.add('show');
                return;
            }

            if (users[usuario] && users[usuario].password === password) {
                localStorage.setItem('nwl_session', JSON.stringify({ usuario, ...users[usuario] }));
                window.location.href = 'reportes.html';
            } else {
                errorMsg.textContent = 'Usuario o contraseña incorrectos.';
                errorMsg.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
    </script>

</body>
</html>
